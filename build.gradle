plugins {
    id 'base'
}

version = mod_version
group = mod_group_id

def gradleWrapper = providers.systemProperty('os.name').get().toLowerCase().contains('windows')
        ? file('gradlew.bat')
        : file('gradlew')

def registerLoaderTask = { String taskName, String taskGroup, String taskDescription, String loaderDir, String loaderTask ->
    tasks.register(taskName, Exec) {
        group = taskGroup
        description = taskDescription
        workingDir = projectDir
        commandLine gradleWrapper.absolutePath, '-p', file(loaderDir).absolutePath, loaderTask
    }
}

registerLoaderTask('buildForge', 'build', 'Builds the Forge loader jar.', 'forge', 'build')
registerLoaderTask('buildFabric', 'build', 'Builds the Fabric loader jar.', 'fabric', 'build')
registerLoaderTask('buildNeoForge', 'build', 'Builds the NeoForge loader jar.', 'neoforge', 'build')

registerLoaderTask('runFabricClient', 'minecraft', 'Runs the Fabric client.', 'fabric', 'runClient')
registerLoaderTask('runFabricServer', 'minecraft', 'Runs the Fabric server.', 'fabric', 'runServer')
registerLoaderTask('runForgeClient', 'minecraft', 'Runs the Forge client.', 'forge', 'runClient')
registerLoaderTask('runForgeServer', 'minecraft', 'Runs the Forge server.', 'forge', 'runServer')
registerLoaderTask('runNeoForgeClient', 'minecraft', 'Runs the NeoForge client.', 'neoforge', 'runClient')
registerLoaderTask('runNeoForgeServer', 'minecraft', 'Runs the NeoForge server.', 'neoforge', 'runServer')

tasks.register('buildLoaders') {
    group = 'build'
    description = 'Builds Forge, Fabric, and NeoForge loader jars.'
    dependsOn tasks.named('buildForge')
    dependsOn tasks.named('buildFabric')
    dependsOn tasks.named('buildNeoForge')
}

tasks.named('build') {
    dependsOn tasks.named('buildLoaders')
}
